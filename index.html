<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SX☠️ ABIR ♔ 👺 - GOD MOD</title>
    <style>
        :root { 
            --glass: rgba(0, 150, 255, 0.1);
            --border: rgba(0, 191, 255, 0.4);
            --neon-blue: #00d4ff;
            --neon-red: #ff003c;
            --gold: #ffea00;
        }

        body, html {
            height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif;
            background: #00040a; color: #fff; overflow-x: hidden; user-select: none;
        }

        /* --- Stylish Typing Intro --- */
        #introScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #00040a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000;
            transition: opacity 0.8s ease-out;
        }
        .intro-line {
            font-size: clamp(24px, 8vw, 42px);
            font-weight: 900; letter-spacing: 4px; white-space: nowrap;
            text-transform: uppercase; border-right: 4px solid var(--neon-red);
            padding-right: 10px; animation: typing 2s steps(20), blink 0.5s step-end infinite;
            overflow: hidden; text-shadow: 0 0 15px var(--neon-blue);
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--neon-red) } }

        .app-frame { max-width: 480px; margin: auto; padding: 15px; }
        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .header { text-align: center; border-bottom: 2px solid var(--neon-red); padding-bottom: 10px; margin-bottom: 20px; }
        .pred-val { font-size: 75px; font-weight: 900; text-shadow: 0 0 20px var(--neon-blue); margin: 10px 0; }
        .timer-display { font-size: 24px; color: var(--gold); font-weight: bold; }
        .status-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--neon-blue); margin-bottom: 10px;}
        .strat-mode { font-size: 10px; background: rgba(0, 212, 255, 0.2); padding: 4px 10px; border-radius: 5px; color: var(--neon-blue); border: 1px solid var(--neon-blue); margin-bottom: 10px; display: inline-block; }
        .lvl-badge { background: rgba(255, 0, 60, 0.2); border: 1px solid var(--neon-red); padding: 8px; border-radius: 10px; font-weight: bold; margin: 15px 0; font-size: 13px; }
        .num-row { display: flex; justify-content: center; gap: 20px; }
        .num-circle { width: 45px; height: 45px; line-height: 45px; border: 2px solid var(--gold); border-radius: 50%; font-weight: 900; background: rgba(0,0,0,0.4); color: var(--gold); }
        
        .history-wrap { max-height: 250px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { color: var(--neon-blue); padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .win { color: #00ff41; font-weight: bold; }
        .loss { color: #ff003c; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="introScreen">
        <div class="intro-line">👑 SX☠️ ABIR <span style="color:var(--neon-red)">♔ 👺</span></div>
        <p style="color: var(--neon-blue); letter-spacing: 2px; margin-top: 20px; font-size: 10px;">👑 𝐂𝐑𝐀𝐂𝐊 𝐁𝐘 SX☠️ ABIR ♔ 👺 💲 💀 BOOTING...</p>
    </div>

    <div id="mainWrapper" class="hidden">
        <div class="app-frame">
            <div class="header">
                <span style="font-size: 20px; font-weight: 900;">👑 𝐂𝐑𝐀𝐂𝐊 𝐁𝐘 <span style="color:var(--neon-blue)">SX☠️ ABIR ♔ 👺</span> 💲 💀</span>
            </div>

            <div id="hackSection">
                <div class="status-info">
                    <span>● SERVER: STABLE</span>
                    <span id="pingVal">PING: 18MS</span>
                </div>

                <div class="glass-card" style="text-align: center;">
                    <div id="stratDisplay" class="strat-mode">MODE: ANALYZING MARKET...</div>
                    <div id="timer" class="timer-display">00:60</div>
                    <div id="pID" style="color: rgba(255,255,255,0.4); font-size: 11px; margin-bottom: 5px;">PERIOD: ---</div>
                    <div id="pRes" class="pred-val">WAIT</div>
                    <div id="mLevel" class="lvl-badge">MARTINGALE: LEVEL 1</div>
                    <div style="font-size: 10px; color: var(--gold); margin-bottom: 5px;">OPPOSITE CATEGORY NUMBERS:</div>
                    <div class="num-row" id="numRow">
                        <div class="num-circle">?</div>
                        <div class="num-circle">?</div>
                    </div>
                </div>

                <div class="glass-card">
                    <div style="font-size: 11px; color: var(--neon-blue); margin-bottom: 10px;">👑 SX☠️ ABIR ♔ 👺 HISTORY</div>
                    <div class="history-wrap">
                        <table>
                            <thead><tr><th>PERIOD</th><th>PRED</th><th>RESULT</th><th>STATUS</th></tr></thead>
                            <tbody id="logs"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const API = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";
    let lastP = null, nextP = null, targetNums = [], currentLevel = 1;

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('introScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('introScreen').classList.add('hidden');
                document.getElementById('mainWrapper').classList.remove('hidden');
                syncEngine();
                setInterval(syncEngine, 2000);
                startClock();
            }, 800);
        }, 3000);
    };

    function startClock() {
        setInterval(() => {
            const rem = 60 - new Date().getSeconds();
            document.getElementById('timer').innerText = `00:${rem < 10 ? '0' + rem : rem}`;
            document.getElementById('timer').style.color = rem <= 5 ? "#ff003c" : "#ffea00";
        }, 1000);
    }

    async function syncEngine() {
        try {
            const r = await fetch(API + '?t=' + Date.now());
            const d = await r.json();
            const top = d.data.list[0];
            processHybrid(top.issueNumber, parseInt(top.number), d.data.list);
        } catch (e) {}
    }

    function processHybrid(p, num, list) {
        const actual = num >= 5 ? "BIG" : "SMALL";
        if (lastP !== p) {
            if (nextP && lastP) {
                const win = (nextP === actual) || targetNums.includes(num);
                if(win) { currentLevel = 1; }
                else { currentLevel++; if(currentLevel > 4) currentLevel = 1; }
                
                const multiplier = currentLevel === 1 ? "1X" : (currentLevel === 2 ? "3X" : (currentLevel === 3 ? "9X" : "27X"));
                document.getElementById('mLevel').innerText = `MARTINGALE: LEVEL ${currentLevel} (${multiplier})`;
                
                const row = `<tr><td>${p.slice(-3)}</td><td>${nextP}</td><td>${actual}(${num})</td><td class="${win?'win':'loss'}">${win?'WIN':'LOSS'}</td></tr>`;
                document.getElementById('logs').innerHTML = row + document.getElementById('logs').innerHTML;
            }
            
            lastP = p;
            const last5 = list.slice(0, 5).map(x => parseInt(x.number) >= 5 ? "BIG" : "SMALL");
            const lastNums = list.slice(0, 5).map(x => parseInt(x.number));
            const stratDisp = document.getElementById('stratDisplay');

            if (last5[0] === last5[1] && last5[1] === last5[2]) {
                nextP = last5[0]; 
                stratDisp.innerText = "MODE: DRAGON FOLLOW";
            } 
            else {
                nextP = (last5[0] === "BIG") ? "SMALL" : "BIG";
                stratDisp.innerText = "MODE: SMART REVERSE";
            }

            const sum = lastNums.reduce((a, b) => a + b, 0);
            if (nextP === "BIG") {
                targetNums = (sum > 20) ? [0, 2] : [1, 3];
            } else {
                targetNums = (sum < 25) ? [7, 9] : [6, 8];
            }

            document.getElementById('pID').innerText = "PERIOD: " + (BigInt(p) + 1n).toString();
            document.getElementById('pRes').innerText = nextP;
            document.getElementById('pRes').style.color = nextP === "BIG" ? "#ffea00" : "#00ff41";
            document.getElementById('numRow').innerHTML = `<div class="num-circle">${targetNums[0]}</div><div class="num-circle">${targetNums[1]}</div>`;
        }
    }
</script>
</body>
</html>
